<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字拔河對抗賽 - 森林篇</title>
    <style>
        :root {
            --dolphin-color: #00d2ff;
            --cat-color: #ff9f43;
            --sky-blue: #87CEEB;
            --grass-green: #2ecc71;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 0; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; background: var(--sky-blue);
            touch-action: manipulation;
        }

        /* 背景風景 */
        .cloud {
            position: absolute; background: white; border-radius: 50px;
            opacity: 0.8; z-index: 1; animation: cloudMove linear infinite;
        }
        .cloud::after, .cloud::before {
            content: ''; position: absolute; background: white; border-radius: 50%;
        }
        .c1 { width: 100px; height: 40px; top: 10%; left: -150px; animation-duration: 25s; }
        .c2 { width: 150px; height: 60px; top: 25%; left: -200px; animation-duration: 40s; animation-delay: 5s; }
        @keyframes cloudMove { from { left: -200px; } to { left: 100vw; } }

        .landscape {
            position: absolute; bottom: 0; width: 100%; height: 35vh;
            background: linear-gradient(to top, #27ae60 0%, #2ecc71 100%);
            z-index: 2; border-top: 5px solid #1e8449;
        }

        /* 頂部雙人計分板 */
        #header-scoreboard {
            position: relative; z-index: 10;
            width: 100%; height: 80px;
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(0, 0, 0, 0.7);
            color: white; border-bottom: 3px solid #f1c40f;
        }

        .score-display {
            display: flex; align-items: center; gap: 15px; font-size: 2.5rem; font-weight: 900;
        }
        .timer-display {
            background: #ff7675; padding: 5px 20px; border-radius: 50px;
            font-size: 1.5rem; border: 2px solid white;
        }

        /* 拔河核心區 */
        #arena {
            position: relative; z-index: 5; width: 100%; height: 200px;
            display: flex; align-items: center; justify-content: center;
            margin-top: 20px;
        }

        #rope {
            width: 120vw; height: 14px;
            background: repeating-linear-gradient(45deg, #d35400, #d35400 10px, #e67e22 10px, #e67e22 20px);
            position: relative; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .character { font-size: 70px; position: absolute; top: -85px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3)); }
        #p1-char { left: 20%; transform: scaleX(-1); }
        #p2-char { right: 20%; }
        .center-flag { width: 6px; height: 100px; background: #e74c3c; margin: 0 auto; border: 1px solid white; }

        /* 題目與操作區 */
        #game-interface {
            position: relative; z-index: 10; flex: 1; width: 95%; max-width: 1000px;
            display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;
        }

        #question-card {
            background: rgba(255, 255, 255, 0.95); width: 90%; padding: 25px;
            border-radius: 30px; font-size: 2.2rem; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); color: #2d3436; border-bottom: 6px solid #dfe6e9;
        }

        .battle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; }
        .team-side { display: flex; flex-direction: column; gap: 15px; }
        .btn-ans {
            padding: 20px; font-size: 2rem; font-weight: bold; border: none; border-radius: 20px;
            cursor: pointer; transition: 0.1s; box-shadow: 0 8px 0 rgba(0,0,0,0.2); color: white;
        }
        .btn-p1 { background: var(--dolphin-color); }
        .btn-p2 { background: var(--cat-color); }
        .btn-ans:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.2); }

        /* 蓋板畫面 */
        .overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .start-btn { padding: 20px 60px; font-size: 2.2rem; background: #2ecc71; color: white; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="cloud c1"></div><div class="cloud c2"></div>
    <div class="landscape"></div>

    <div id="screen-overlay" class="overlay">
        <h1 style="font-size: 3.5rem;">🌳 漢字拔河對戰</h1>
        <p style="font-size: 1.5rem; margin-bottom: 30px;">海豚 (A/D) ⚔️ 小貓 (←/→)</p>
        <button class="start-btn" onclick="startGame()">開始對決</button>
    </div>

    <div id="header-scoreboard">
        <div class="score-display" style="color: var(--dolphin-color)">
            <span>🐬</span> <span id="p1-score-val">0</span>
        </div>
        <div class="timer-display">⏳ <span id="timer-val">90</span>s</div>
        <div class="score-display" style="color: var(--cat-color)">
            <span id="p2-score-val">0</span> <span>🐱</span>
        </div>
    </div>

    <div id="arena">
        <div id="rope">
            <div id="p1-char" class="character">🐬</div>
            <div class="center-flag"></div>
            <div id="p2-char" class="character">🐱</div>
        </div>
    </div>

    <div id="game-interface">
        <div id="question-card">載入中...</div>
        <div class="battle-grid">
            <div class="team-side">
                <button class="btn-ans btn-p1" onclick="handleInput(0, 'p1')">A</button>
                <button class="btn-ans btn-p1" onclick="handleInput(1, 'p1')">B</button>
            </div>
            <div class="team-side">
                <button class="btn-ans btn-p2" onclick="handleInput(0, 'p2')">A</button>
                <button class="btn-ans btn-p2" onclick="handleInput(1, 'p2')">B</button>
            </div>
        </div>
    </div>

    <script>
        const originalData = [
            { q: "這件事情還（__）完成。", opt: ["未", "末"], ans: 0 },
            { q: "這是一年之（__）。", opt: ["未", "末"], ans: 1 },
            { q: "他是一位勇敢的（__）兵。", opt: ["士", "土"], ans: 0 },
            { q: "地上有很多（__）。", opt: ["士", "土"], ans: 1 },
            { q: "我（__）經吃飽了。", opt: ["已", "己"], ans: 0 },
            { q: "請先做好自（__）管理。", opt: ["已", "己"], ans: 1 },
            { q: "今（__）天氣很好。", opt: ["日", "曰"], ans: 0 },
            { q: "孔子（__）：「學而時習之。」", opt: ["日", "曰"], ans: 1 },
            { q: "有一個（__）走進教室。", opt: ["人", "入"], ans: 0 },
            { q: "請（__）內坐。", opt: ["人", "入"], ans: 1 },
            { q: "他用（__）切水果。", opt: ["刀", "力"], ans: 0 },
            { q: "做事情要用（__）氣。", opt: ["刀", "力"], ans: 1 },
            { q: "他有一（__）元。", opt: ["千", "干"], ans: 0 },
            { q: "不要隨便（__）涉別人。", opt: ["千", "干"], ans: 1 },
            { q: "這是一棵大（__）。", opt: ["木", "本"], ans: 0 },
            { q: "這（__）書很好看。", opt: ["木", "本"], ans: 1 },
            { q: "他長得很（__）高了。", opt: ["大", "太"], ans: 0 },
            { q: "今天（__）陽很大。", opt: ["大", "太"], ans: 1 },
            { q: "今（__）是星期五。", opt: ["天", "夭"], ans: 0 },
            { q: "小狗不幸（__）折。", opt: ["天", "夭"], ans: 1 },
            { q: "農夫在放（__）。", opt: ["牛", "午"], ans: 0 },
            { q: "中（__）休息時間到了。", opt: ["牛", "午"], ans: 1 },
            { q: "他是國（__）。", opt: ["王", "玉"], ans: 0 },
            { q: "這塊（__）很漂亮。", opt: ["王", "玉"], ans: 1 },
            { q: "他的頭髮很（__）。", opt: ["白", "百"], ans: 0 },
            { q: "他活到一（__）歲。", opt: ["白", "百"], ans: 1 },
            { q: "請用眼（__）看。", opt: ["目", "自"], ans: 0 },
            { q: "請（__）己完成作業。", opt: ["目", "自"], ans: 1 },
            { q: "他用（__）拿東西。", opt: ["手", "毛"], ans: 0 },
            { q: "小狗身上有很多（__）。", opt: ["手", "毛"], ans: 1 }
        ];

        let questions = [];
        let cur = 0, p1S = 0, p2S = 0, time = 90, ropePos = 0, active = false, clock;

        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function startGame() {
            questions = shuffle([...originalData]);
            cur = 0; p1S = 0; p2S = 0; time = 90; ropePos = 0; active = true;
            document.getElementById('screen-overlay').style.display = 'none';
            syncUI();
            startClock();
            showQ();
        }

        function showQ() {
            if (cur >= questions.length) return end();
            const q = questions[cur];
            document.getElementById('question-card').innerText = q.q;
            const b = document.querySelectorAll('.btn-ans');
            b[0].innerText = q.opt[0]; b[1].innerText = q.opt[1];
            b[2].innerText = q.opt[0]; b[3].innerText = q.opt[1];
        }

        function handleInput(idx, player) {
            if (!active) return;
            const isRight = (idx === questions[cur].ans);
            if (player === 'p1') {
                if (isRight) { p1S++; ropePos -= 45; } else { ropePos += 30; }
            } else {
                if (isRight) { p2S++; ropePos += 45; } else { ropePos -= 30; }
            }
            syncUI(); cur++; showQ();
        }

        function syncUI() {
            document.getElementById('p1-score-val').innerText = p1S;
            document.getElementById('p2-score-val').innerText = p2S;
            const limit = window.innerWidth / 2 - 50;
            ropePos = Math.max(-limit, Math.min(limit, ropePos));
            document.getElementById('rope').style.transform = `translateX(${ropePos}px)`;
        }

        function startClock() {
            clock = setInterval(() => {
                time--; document.getElementById('timer-val').innerText = time;
                if (time <= 0) end();
            }, 1000);
        }

        function end() {
            active = false; clearInterval(clock);
            const res = p1S > p2S ? "🐬 海豚隊 勝利！" : (p2S > p1S ? "🐱 小貓隊 勝利！" : "握手言和！");
            const over = document.getElementById('screen-overlay');
            over.innerHTML = `<h1 style="font-size:3rem;">遊戲結束</h1><h2>${res}</h2><p>海豚 ${p1S} : 小貓 ${p2S}</p><button class="start-btn" onclick="location.reload()">重新比賽</button>`;
            over.style.display = 'flex';
        }

        window.addEventListener('keydown', (e) => {
            if (!active) return;
            const k = e.key.toLowerCase();
            if (k === 'a') handleInput(0, 'p1'); if (k === 'd') handleInput(1, 'p1');
            if (k === 'arrowleft') handleInput(0, 'p2'); if (k === 'arrowright') handleInput(1, 'p2');
        });
    </script>
</body>
</html>
