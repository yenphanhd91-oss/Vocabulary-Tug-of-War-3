<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>遠端中文拔河賽</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #eef2f3; text-align: center; overflow: hidden; }
        #setup, #game, #result { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn { padding: 15px 30px; font-size: 20px; border-radius: 12px; border: none; cursor: pointer; margin: 10px; color: white; transition: 0.2s; }
        .dolphin-btn { background: #3498db; }
        .cat-btn { background: #e67e22; }
        
        /* 拔河區 */
        .rope-container { width: 90%; height: 120px; position: relative; border-bottom: 2px solid #999; margin: 20px 0; }
        #rope { position: absolute; width: 100%; height: 8px; background: #7f8c8d; top: 70px; transition: 0.5s ease-out; }
        #knot { position: absolute; width: 20px; height: 20px; background: red; left: 50%; top: -6px; border-radius: 50%; transform: translateX(-50%); }
        .team-icon { position: absolute; font-size: 40px; top: -50px; }
        #icon-left { left: 10px; } #icon-right { right: 10px; }

        .question { font-size: 24px; font-weight: bold; margin: 20px; padding: 15px; background: white; border-radius: 10px; width: 80%; }
        .options { display: flex; gap: 20px; }
        .opt { padding: 20px 40px; font-size: 24px; background: white; border: 2px solid #333; border-radius: 10px; }
        .score-board { display: flex; gap: 50px; font-size: 18px; font-weight: bold; }
        #timer { font-size: 30px; color: #c0392b; margin-top: 10px; }
        #waiting { font-style: italic; color: #7f8c8d; }
    </style>
</head>
<body>

<div id="setup">
    <h2>選擇你的隊伍</h2>
    <button class="btn dolphin-btn" onclick="chooseTeam('dolphin')">我是 海豚隊 🐬</button>
    <button class="btn cat-btn" onclick="chooseTeam('cat')">我是 小貓隊 🐱</button>
    <p id="waiting">等待另一位玩家加入後即可開始...</p>
</div>

<div id="game" style="display:none;">
    <div class="score-board">
        <div style="color:#3498db">🐬: <span id="s-dolphin">0</span></div>
        <div id="timer">90</div>
        <div style="color:#e67e22">🐱: <span id="s-cat">0</span></div>
    </div>

    <div class="rope-container">
        <div id="rope">
            <span id="icon-left">🐬</span>
            <div id="knot"></div>
            <span id="icon-right">🐱</span>
        </div>
    </div>

    <div class="question" id="q-text">載入題目中...</div>
    <div class="options">
        <button class="opt" id="opt0" onclick="check(0)"></button>
        <button class="opt" id="opt1" onclick="check(1)"></button>
    </div>
</div>

<div id="result" style="display:none;">
    <h1 id="winner"></h1>
    <button class="btn" style="background:#2ecc71" onclick="location.reload()">再玩一次</button>
</div>

db.on('value', (snap) => {
    const data = snap.val();
    if (!data) return;

    document.getElementById('s-dolphin').innerText = data.scoreD;
    document.getElementById('s-cat').innerText = data.scoreC;
    document.getElementById('timer').innerText = data.timer;

    // 繩子邏輯 (50% 是中心，分差 * 5% 位移)
    let offset = (data.scoreD - data.scoreC) * 5;
    document.getElementById('rope').style.transform = `translateX(${offset}%)`;

    if (data.status === 'ended' || data.currentQ >= 30) {
        showResult(data);
    } else {
        const q = data.qs[data.currentQ];
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('opt0').innerText = q.a;
        document.getElementById('opt1').innerText = q.b;
        window.correctIdx = q.r;
    }
});

function check(idx) {
    db.once('value', (snap) => {
        const data = snap.val();
        let up = { currentQ: data.currentQ + 1 };
        if (idx === window.correctIdx) {
            if (myRole === 'dolphin') up.scoreD = data.scoreD + 1;
            else up.scoreC = data.scoreC + 1;
        } else {
            // 答錯，對方加分
            if (myRole === 'dolphin') up.scoreC = data.scoreC + 1;
            else up.scoreD = data.scoreD + 1;
        }
        db.update(up);
    });
}

function showResult(data) {
    document.getElementById('game').style.display = 'none';
    document.getElementById('result').style.display = 'flex';
    let msg = data.scoreD > data.scoreC ? "🐬 海豚隊 勝利！" : (data.scoreC > data.scoreD ? "🐱 小貓隊 勝利！" : "雙方平手！");
    document.getElementById('winner').innerText = msg;
}
